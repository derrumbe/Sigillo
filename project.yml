name: C2PACamera
options:
  bundleIdPrefix: org.contentauth.example
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  C2PA:
    url: https://github.com/contentauth/c2pa-ios.git
    from: 0.0.9

targets:
  C2PACamera:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Resources/**"
      - path: Sources/Resources
        buildPhase: resources
    dependencies:
      - package: C2PA
        product: C2PA
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: C2PA Camera
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: >-
          This app uses the camera to take photos and embed C2PA Content
          Credentials that record how each image was created.
        NSPhotoLibraryAddUsageDescription: >-
          This app saves photos with embedded C2PA Content Credentials to your
          photo library.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.contentauth.example.C2PACamera
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        # Set your Apple Developer Team ID here (or in Xcode > Signing & Capabilities)
        # so the app can run on a physical device.
        DEVELOPMENT_TEAM: ""

schemes:
  C2PACamera:
    build:
      targets:
        C2PACamera: all
    run:
      config: Debug
    archive:
      config: Release
