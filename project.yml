name: Sigillo
options:
  bundleIdPrefix: org.xebecstudios
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  C2PA:
    url: https://github.com/contentauth/c2pa-ios.git
    from: 0.0.9

targets:
  Sigillo:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Resources/**"
      - path: Sources/Resources
        buildPhase: resources
    dependencies:
      - package: C2PA
        product: C2PA
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Sigillo
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "2"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiresFullScreen: true
        # Sigillo's only cryptography is C2PA digital signatures (ECDSA/ES256)
        # and RFC 3161 timestamping — both exempt from US export control. No
        # data-confidentiality encryption, so no non-exempt encryption is used.
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: >-
          This app uses the camera to take photos and embed C2PA Content
          Credentials that record how each image was created.
        NSPhotoLibraryAddUsageDescription: >-
          This app saves photos with embedded C2PA Content Credentials to your
          photo library.
        NSLocationWhenInUseUsageDescription: >-
          Location is embedded as GPS coordinates in the photo's C2PA Content
          Credentials when you enable the Location metadata option.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.xebecstudios.Sigillo
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        # Set your Apple Developer Team ID here (or in Xcode > Signing & Capabilities)
        # so the app can run on a physical device.
        DEVELOPMENT_TEAM: "QAB3T8245F"

schemes:
  Sigillo:
    build:
      targets:
        Sigillo: all
    run:
      config: Debug
    archive:
      config: Release
